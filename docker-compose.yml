version: '3.9'

# WebHop — Full Stack Docker Compose
# Services: postgres | wordpress | backend | frontend (dev)
# Run: docker compose up

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: webhop-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       webhop
      POSTGRES_USER:     webhop
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-webhop_dev_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U webhop -d webhop"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - webhop-net

  # ── MySQL (for WordPress) ───────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: webhop-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE:      wordpress
      MYSQL_USER:          wordpress
      MYSQL_PASSWORD:      ${MYSQL_PASSWORD:-wordpress_dev}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "wordpress", "-pwordpress_dev"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - webhop-net

  # ── WordPress Engine ────────────────────────────────────────────────────────
  wordpress:
    build:
      context: ./wordpress-engine
      dockerfile: Dockerfile
    container_name: webhop-wordpress
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      WORDPRESS_DB_HOST:     mysql:3306
      WORDPRESS_DB_USER:     wordpress
      WORDPRESS_DB_PASSWORD: ${MYSQL_PASSWORD:-wordpress_dev}
      WORDPRESS_DB_NAME:     wordpress
      WORDPRESS_DEBUG:       0
      WP_SITE_URL:           ${WP_SITE_URL:-http://localhost:8080}
      WP_ADMIN_USER:         ${WP_ADMIN_USER:-admin}
      WP_ADMIN_PASSWORD:     ${WP_ADMIN_PASSWORD:-WebHop2024!}
      WP_ADMIN_EMAIL:        ${WP_ADMIN_EMAIL:-admin@webhop.local}
    volumes:
      - wp_content:/var/www/html/wp-content
      - ./wordpress-engine/themes/webhop-theme:/var/www/html/wp-content/themes/webhop-theme:ro
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/wp-login.php"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - webhop-net

  # ── Backend API ─────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./docker
      dockerfile: Dockerfile.backend
    container_name: webhop-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV:          production
      PORT:              4000
      DATABASE_URL:      postgresql://webhop:${POSTGRES_PASSWORD:-webhop_dev_password}@postgres:5432/webhop
      JWT_SECRET:        ${JWT_SECRET:-change-me-in-production-use-random-32-char-string}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      WP_SITE_URL:       http://wordpress:80
      WP_ADMIN_USER:     ${WP_ADMIN_USER:-admin}
      WP_ADMIN_PASSWORD: ${WP_ADMIN_PASSWORD:-WebHop2024!}
      WP_ADMIN_EMAIL:    ${WP_ADMIN_EMAIL:-admin@webhop.local}
      FRONTEND_URL:      ${FRONTEND_URL:-http://localhost:3000}
      CIPHER_KEY:        ${CIPHER_KEY:-webhop-cipher-00000000000000000}
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - webhop-net

  # ── Frontend (dev only) ─────────────────────────────────────────────────────
  frontend:
    image: node:22-alpine
    container_name: webhop-frontend
    working_dir: /app
    volumes:
      - ./apps/frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      VITE_API_URL: http://localhost:4000/api
    ports:
      - "3000:3000"
    profiles:
      - dev
    networks:
      - webhop-net

volumes:
  postgres_data:
  mysql_data:
  wp_content:

networks:
  webhop-net:
    driver: bridge
