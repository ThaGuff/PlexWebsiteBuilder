<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Spider web background -->
  <circle cx="24" cy="24" r="20" stroke="#C8E20A" stroke-width="0.5" stroke-opacity="0.3"/>
  <circle cx="24" cy="24" r="13" stroke="#C8E20A" stroke-width="0.5" stroke-opacity="0.3"/>
  <circle cx="24" cy="24" r="6.5" stroke="#C8E20A" stroke-width="0.5" stroke-opacity="0.3"/>
  <!-- Web radial lines -->
  <line x1="24" y1="4" x2="24" y2="44" stroke="#C8E20A" stroke-width="0.5" stroke-opacity="0.3"/>
  <line x1="4" y1="24" x2="44" y2="24" stroke="#C8E20A" stroke-width="0.5" stroke-opacity="0.3"/>
  <line x1="9.37" y1="9.37" x2="38.63" y2="38.63" stroke="#C8E20A" stroke-width="0.5" stroke-opacity="0.3"/>
  <line x1="38.63" y1="9.37" x2="9.37" y2="38.63" stroke="#C8E20A" stroke-width="0.5" stroke-opacity="0.3"/>
  
  <!-- Frog body -->
  <ellipse cx="24" cy="27" rx="9" ry="8" fill="#C8E20A"/>
  
  <!-- Frog head -->
  <ellipse cx="24" cy="20" rx="7.5" ry="6" fill="#C8E20A"/>
  
  <!-- Frog eyes (big, googly) -->
  <circle cx="20" cy="16.5" r="3.5" fill="#1A1A1A" stroke="#C8E20A" stroke-width="1"/>
  <circle cx="28" cy="16.5" r="3.5" fill="#1A1A1A" stroke="#C8E20A" stroke-width="1"/>
  <!-- Eye shine -->
  <circle cx="21.2" cy="15.5" r="1.2" fill="white"/>
  <circle cx="29.2" cy="15.5" r="1.2" fill="white"/>
  <!-- Pupils -->
  <circle cx="20.5" cy="16.8" r="1.5" fill="#0A0A0A"/>
  <circle cx="28.5" cy="16.8" r="1.5" fill="#0A0A0A"/>
  
  <!-- Frog smile -->
  <path d="M20 22.5 Q24 25 28 22.5" stroke="#1A1A1A" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  
  <!-- Frog nostrils -->
  <circle cx="22.5" cy="20.5" r="0.8" fill="#A8BF08"/>
  <circle cx="25.5" cy="20.5" r="0.8" fill="#A8BF08"/>
  
  <!-- Front legs (sitting on web) -->
  <path d="M15 28 Q11 30 10 33 Q12 34 14 32" fill="#C8E20A"/>
  <path d="M33 28 Q37 30 38 33 Q36 34 34 32" fill="#C8E20A"/>
  
  <!-- Back legs -->
  <path d="M17 33 Q13 36 12 40 Q15 41 17 38 Q18 36 20 35" fill="#A8BF08"/>
  <path d="M31 33 Q35 36 36 40 Q33 41 31 38 Q30 36 28 35" fill="#A8BF08"/>
  
  <!-- Belly sheen -->
  <ellipse cx="24" cy="28" rx="5" ry="4" fill="#D8EE33" opacity="0.5"/>
</svg>
